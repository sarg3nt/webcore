name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install templ
        run: go install github.com/a-h/templ/cmd/templ@v0.3.1020

      - name: Verify generated templ code is in sync
        # *_templ.go is committed so consumers build without the templ CLI.
        # Regenerate and fail if a .templ was edited without regenerating.
        run: |
          templ generate
          git diff --exit-code -- '*_templ.go' || {
            echo '::error::Generated *_templ.go out of sync — run `make generate` and commit.'
            exit 1
          }

      - name: Verify gofmt
        run: |
          out=$(gofmt -l . | grep -v _templ.go || true)
          if [ -n "$out" ]; then
            echo "::error::Files need gofmt:"; echo "$out"; exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: Build (default tags)
        run: go build ./...

      - name: Build (-tags dev)
        # The auth dev-bypass has a build-tag sibling; make sure both compile.
        run: go build -tags dev ./...

      - name: Test (race)
        run: go test -race ./...

      - name: Test (-tags dev, race)
        run: go test -tags dev -race ./core/auth/
